name: Deploy static site to GitHub Pages (DEPRECATED - see deploy-cloudflare.yml and CLOUDFLARE_BEST_PRACTICES_DEPLOY.md)

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # IMPORTANT: Set your Cloudflare Worker URL here so the static frontend
      # can call live APIs (leaderboard, mirrors, etc.).
      # Example: https://alpha-wallet-mirror.<subdomain>.workers.dev
      # Or create api.alphamirror.trade pointing to a Worker and use https://api.alphamirror.trade
      - name: Build static export (GitHub Pages)
        run: npm run build:static
        env:
          NEXT_PUBLIC_API_BASE: ${{ vars.NEXT_PUBLIC_API_BASE || 'https://alpha-wallet-mirror.YOUR_SUBDOMAIN.workers.dev' }}
          # Add other public NEXT_PUBLIC_ vars your frontend needs (Stripe publishable key etc.)
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY || '' }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# After first successful deploy:
# 1. Go to repo Settings > Pages and add Custom domain: alphamirror.trade
# 2. Update your Cloudflare DNS (see scripts or manual A/AAAA records for GH Pages)
# 3. (Optional) Set repository variables in Settings > Secrets and variables > Actions > Variables
#    - NEXT_PUBLIC_API_BASE = https://... (your live worker or api subdomain)
#    - Other NEXT_PUBLIC_* keys as needed